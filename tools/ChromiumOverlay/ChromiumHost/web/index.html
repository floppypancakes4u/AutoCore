<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoCore Chromium Overlay</title>
  <style>
    html, body, * {
      pointer-events: none !important;
      user-select: none !important;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: Segoe UI, system-ui, sans-serif;
    }
    .wrap {
      padding: 24px 32px;
      background: transparent;
    }
    h1 {
      margin: 0;
      font-size: 72px;
      line-height: 1.1;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.85), 0 0 2px #000;
      background: transparent;
    }
    #state {
      margin-top: 16px;
      font-size: 14px;
      color: #b8f0c8;
      text-shadow: 0 1px 4px #000;
      white-space: pre-wrap;
      max-width: 80vw;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hello World</h1>
    <pre id="state">waiting for bridge…</pre>
  </div>
  <script src="app.js"></script>
</body>
</html>
