# serverConfig.yaml — AutoCore server tuning (YAML sibling to loot.tuning.json).
# Comment-friendly; missing keys keep defaults. Env override: AUTOCORE_SERVER_CONFIG_FILE.
# Scopes: NPC vehicle physics, map-prop ramming, inventory debug, combat debug logs.

# Map-prop ramming (VehicleMapPropRam): moving vehicles damage collidable scenery on contact.
# Defaults off — set true to enable server-side ram damage + loot.
enableRamming: false

# Retail-faithful NPC vehicle driving (feature-NPC-Retail-Driving).
npcVehiclePhysics:
  # Which mover drives NPC vehicles along paths:
  #   hard      - legacy NpcPathFollower hard stepper (default; current behaviour)
  #   soft      - SoftNpcPathMotion pure-pursuit look-ahead
  #   kinematic - NpcVehicleDriveController (curvature/terrain-aligned kinematic)
  #   physics   - retail Havok single-rigid-body simulation (requires enabled: true)
  # Opt-in rollout: ship hard/off. For live physics A/B flip both:
  #   controllerTier: physics
  #   enabled: true
  controllerTier: hard

  # Master switch for the Havok physics simulation. Must be true for controllerTier: physics.
  enabled: false

  # Placeholder fixed substep rate in Hz (accumulator fed variable server dt). Clamped [1, 480].
  # Client retail uses frameDt/N via StepTo 0x4d6c80 (N=floor(frameDt·~30)+1, max ~1/30 s), not fixed Hz.
  substepHz: 60

  # World gravity in world-units/s² (negative = down, +Y up). Refined during Phase 0 RE.
  gravity: -9.81

  # Optional air-density override for aerodynamics. Omit / null to use each clonebase's own value.
  # airDensityOverride: 1.2

  # Verbose per-vehicle physics logging (development only).
  debugLogging: false

  # CW: wheel casts also hit map-prop / vehicle proxy volumes (Scale + SkirtExtents).
  # Defaults off — terrain-only until opted in. Residual gaps in IMPLEMENTATION-GAPS.md.
  # compositeWheelCollisionEnabled: false

# Inventory system (grab/drop/mass-move, cargo/locker).
inventory:
  # Verbose packet logs: raw hex + parsed fields + operation result lines (HandleInventory*).
  # Default off — enable only while reverse-engineering or diagnosing inventory bugs.
  debugPackets: false

# Combat debug logs only — does not change DamagePacket / HP / hit resolution.
combat:
  # Log weapon damage applied to player-owned vehicles.
  logDamageToPlayers: true
  # Log weapon damage applied to NPC vehicles / creatures (player↔NPC).
  logDamageToNpcs: true
  # Log each fire-cycle hit-chance roll (chance + hit/miss) for creature/vehicle targets.
  logHitChanceRolls: true
  # NPC-vs-NPC combat debug lines. Default off — world skirmishes otherwise flood the log.
  logNpcToNpc: false
